<header class="topbar">

  <div class="topbar-left">

    <button id="openSidebar" class="icon-btn mobile-only">
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="page-heading">
      <h2 id="dynamicPageTitle">Dashboard</h2>
      <p id="dynamicPageSubtitle">
        Welcome to ShreeHub Business Suite
      </p>
    </div>

  </div>

  <div class="topbar-right">

    <!-- SEARCH -->
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input
        type="text"
        id="globalSearch"
        placeholder="Search modules..."
      />
    </div>

    <!-- NOTIFICATIONS -->
    <button class="icon-btn">
      <i class="fa-regular fa-bell"></i>
    </button>

    <!-- BUSINESS ACTION -->
    <button id="editBusinessBtn" class="primary-btn topbar-btn">
      <i class="fa-solid fa-pen"></i>
      Edit Business
    </button>

    <!-- PROFILE -->
    <div class="profile-box" title="">
      <div class="avatar" id="profileAvatar">S</div>

      <div class="profile-text">
        <strong id="profileBusinessName" title="ShreeHub">ShreeHub</strong>
        <span>Administrator</span>
      </div>
    </div>

  </div>

</header>
