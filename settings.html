<!DOCTYPE html>
<html lang="en">
<head>
  <!-- BASIC -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShreeHub Business Suite | Settings</title>

  <meta
    name="description"
    content="ShreeHub Business Suite business settings and configuration"
  />

  <!-- PWA -->
  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="manifest.json" />

  <!-- FAVICON -->
  <link rel="icon" href="assets/logo/favicon.ico" />

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- ICONS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
  />

  <!-- SHARED CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/topbar.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <!-- SETTINGS CSS -->
  <link rel="stylesheet" href="modules/settings/settings.css" />
</head>

<body>

  <div id="mobileOverlay" class="mobile-overlay"></div>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <div id="sidebarMount"></div>

    <!-- MAIN -->
    <main class="main-content">

      <!-- TOPBAR -->
      <header class="topbar">

        <div class="topbar-left">
          <button id="openSidebar" class="icon-btn mobile-only">
            <i class="fa-solid fa-bars"></i>
          </button>

          <div class="page-heading">
            <h2>Business Settings</h2>
            <p>Manage branding, business profile, banking and backup</p>
          </div>
        </div>

        <div class="topbar-right">
          <button id="saveSettingsBtn" class="primary-btn">
            <i class="fa-solid fa-floppy-disk"></i>
            Save Settings
          </button>
        </div>

      </header>

      <!-- SETTINGS PAGE -->
      <section class="settings-page">

        <div class="settings-grid">

          <!-- LEFT -->
          <section class="settings-main">

            <!-- BUSINESS INFO -->
            <div class="dashboard-card">
              <div class="card-header">
                <h3>Business Information</h3>
              </div>

              <div class="setup-grid">

                <div class="form-group">
                  <label>Business Name</label>
                  <input type="text" id="businessName" />
                </div>

                <div class="form-group">
                  <label>GSTIN</label>
                  <input type="text" id="businessGST" />
                </div>

                <div class="form-group">
                  <label>Phone</label>
                  <input type="text" id="businessPhone" />
                </div>

                <div class="form-group">
                  <label>Email</label>
                  <input type="email" id="businessEmail" />
                </div>

                <div class="form-group">
                  <label>Website</label>
                  <input type="text" id="businessWebsite" />
                </div>

                <div class="form-group">
                  <label>Pincode</label>
                  <input type="text" id="businessPincode" />
                </div>

                <div class="form-group">
                  <label>City</label>
                  <input type="text" id="businessCity" />
                </div>

                <div class="form-group">
                  <label>State</label>
                  <input type="text" id="businessState" />
                </div>

                <div class="form-group full-width">
                  <label>Full Address</label>
                  <textarea id="businessAddress"></textarea>
                </div>

              </div>
            </div>

            <!-- BANK -->
            <div class="dashboard-card">
              <div class="card-header">
                <h3>Bank & Payment Details</h3>
              </div>

              <div class="setup-grid">

                <div class="form-group">
                  <label>Bank Name</label>
                  <input type="text" id="bankName" />
                </div>

                <div class="form-group">
                  <label>Account Number</label>
                  <input type="text" id="accountNumber" />
                </div>

                <div class="form-group">
                  <label>IFSC Code</label>
                  <input type="text" id="ifscCode" />
                </div>

                <div class="form-group">
                  <label>UPI ID</label>
                  <input type="text" id="upiId" />
                </div>

              </div>
            </div>

            <!-- DOC SETTINGS -->
            <div class="dashboard-card">
              <div class="card-header">
                <h3>Document Defaults</h3>
              </div>

              <div class="setup-grid">

                <div class="form-group">
                  <label>Invoice Prefix</label>
                  <input type="text" id="invoicePrefix" value="INV" />
                </div>

                <div class="form-group">
                  <label>Quotation Prefix</label>
                  <input type="text" id="quotationPrefix" value="QTN" />
                </div>

                <div class="form-group">
                  <label>Receipt Prefix</label>
                  <input type="text" id="receiptPrefix" value="RCT" />
                </div>

              </div>
            </div>

          </section>

          <!-- RIGHT -->
          <aside class="settings-sidebar">

            <!-- BRANDING -->
            <div class="dashboard-card">
              <div class="card-header">
                <h3>Branding</h3>
              </div>

              <div class="branding-block">

                <div class="brand-preview">
                  <img
                    id="logoPreview"
                    src="assets/logo/logo.png"
                    alt="Logo"
                  />
                </div>

                <div class="form-group">
                  <label>Upload Logo</label>
                  <input type="file" id="businessLogo" />
                </div>

                <div class="brand-preview signature-preview">
                  <img
                    id="signaturePreview"
                    src="assets/logo/signature.png"
                    alt="Signature"
                  />
                </div>

                <div class="form-group">
                  <label>Upload Signature</label>
                  <input type="file" id="businessSignature" />
                </div>

              </div>
            </div>

            <!-- BACKUP -->
            <div class="dashboard-card">
              <div class="card-header">
                <h3>Backup & Restore</h3>
              </div>

              <div class="backup-actions">

                <button id="exportBackupBtn" class="secondary-btn">
                  <i class="fa-solid fa-download"></i>
                  Export Backup
                </button>

                <label class="secondary-btn file-label">
                  <i class="fa-solid fa-upload"></i>
                  Import Backup
                  <input type="file" id="importBackupInput" hidden />
                </label>

                <button id="resetAppBtn" class="secondary-btn danger-btn">
                  <i class="fa-solid fa-trash"></i>
                  Reset Application
                </button>

              </div>
            </div>

          </aside>

        </div>

      </section>

    </main>

  </div>

  <!-- JS -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="modules/settings/settings.js"></script>
  <script src="js/sidebar-loader.js"></script>
</body>
</html>
