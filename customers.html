<!DOCTYPE html>
<html lang="en">
<head>
  <!-- BASIC -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShreeHub Business Suite | Customers</title>

  <meta
    name="description"
    content="Manage customers for billing and invoicing"
  />

  <!-- PWA -->
  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="manifest.json" />

  <!-- FAVICON -->
  <link rel="icon" href="assets/logo/favicon.ico" />

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- ICONS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
  />

  <!-- SHARED CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/topbar.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <!-- MODULE CSS -->
  <link rel="stylesheet" href="modules/customers/customers.css" />
</head>

<body>

  <div id="mobileOverlay" class="mobile-overlay"></div>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <div id="sidebarMount"></div>

    <!-- MAIN -->
    <main class="main-content">

      <!-- TOPBAR -->
      <header class="topbar">

        <div class="topbar-left">
          <button id="openSidebar" class="icon-btn mobile-only">
            <i class="fa-solid fa-bars"></i>
          </button>

          <div class="page-heading">
            <h2>Customers</h2>
            <p>Manage customer records for invoices and quotations</p>
          </div>
        </div>

        <div class="topbar-right">

          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="text"
              id="customerSearch"
              placeholder="Search customers..."
            />
          </div>

          <button id="addCustomerBtn" class="primary-btn">
            <i class="fa-solid fa-user-plus"></i>
            Add Customer
          </button>

        </div>

      </header>

      <!-- PAGE -->
      <section class="customers-page">

        <div class="dashboard-card">

          <div class="card-header">
            <h3>Customer Directory</h3>

            <div class="toolbar-right">
              <button id="exportCustomersBtn" class="secondary-btn">
                <i class="fa-solid fa-download"></i>
                Export
              </button>

              <label class="secondary-btn file-label">
                <i class="fa-solid fa-upload"></i>
                Import
                <input type="file" id="importCustomersInput" hidden />
              </label>
            </div>
          </div>

          <!-- EMPTY -->
          <div id="customersEmptyState" class="empty-state">
            <i class="fa-solid fa-users"></i>
            <h4>No Customers Yet</h4>
            <p>Add customers to reuse in billing documents.</p>

            <button id="emptyAddCustomerBtn" class="primary-btn">
              Add First Customer
            </button>
          </div>

          <!-- GRID -->
          <div id="customersGrid" class="customers-grid hidden"></div>

        </div>

      </section>

    </main>

  </div>

  <!-- MODAL -->
  <div id="customerModal" class="modal hidden">

    <div class="modal-content large-modal">

      <div class="modal-header">
        <h2 id="customerModalTitle">Add Customer</h2>

        <button class="icon-btn close-modal">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="modal-body">

        <div class="setup-grid">

          <div class="form-group">
            <label>Customer Name *</label>
            <input type="text" id="custName" />
          </div>

          <div class="form-group">
            <label>GSTIN</label>
            <input type="text" id="custGST" />
          </div>

          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="custPhone" />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" id="custEmail" />
          </div>

          <div class="form-group">
            <label>City</label>
            <input type="text" id="custCity" />
          </div>

          <div class="form-group">
            <label>State</label>
            <input type="text" id="custState" />
          </div>

          <div class="form-group">
            <label>Customer Type</label>
            <select id="custType">
              <option value="Retail">Retail</option>
              <option value="Wholesale">Wholesale</option>
              <option value="Corporate">Corporate</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label>Address</label>
            <textarea id="custAddress"></textarea>
          </div>

          <div class="form-group full-width">
            <label>Notes</label>
            <textarea id="custNotes"></textarea>
          </div>

        </div>

      </div>

      <div class="modal-footer">
        <button class="secondary-btn close-modal">Cancel</button>
        <button id="saveCustomerBtn" class="primary-btn">
          Save Customer
        </button>
      </div>

    </div>

  </div>

  <!-- JS -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="modules/customers/customers.js"></script>
  <script src="js/sidebar-loader.js"></script>
</body>
</html>
